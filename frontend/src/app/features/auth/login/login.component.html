<div class="auth-container">
  <div class="auth-bg-grid"></div>
  <div class="auth-bg-glow"></div>

  <div class="auth-card">
    <span class="auth-logo">Hyper<span class="accent">tube</span></span>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to continue watching</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

      <div class="field-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="text"
          formControlName="email"
          placeholder="example@gmail.com"
          autocomplete="email">
      </div>

      <div class="field-group">
        <div class="field-label-row">
          <label for="password">Password</label>
          <a routerLink="/forgot-password" class="field-link">Forgot password?</a>
        </div>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password">
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign in' }}
      </button>

    </form>

    <div class="divider-or"><span>or continue with</span></div>

    <div class="oauth-row">
      <a href="http://localhost:8080/oauth2/authorization/google" class="oauth-btn" style="text-decoration: none; display: block; line-height: 2;">Google</a>
      <a href="http://localhost:8080/oauth2/authorization/fortytwo" class="oauth-btn" style="text-decoration: none; display: block; line-height: 2;">42 Intra</a>
    </div>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
