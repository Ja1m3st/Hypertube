<div class="desktop-bg">
  <div class="win98-dialog">
    
    <div class="dialog-titlebar">
      <div class="title-text">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor" style="margin-right: 6px;">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4Zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10Z"/>
        </svg>
        Account Setup
      </div>
      <button class="win-close-btn" disabled>✕</button>
    </div>

    <div class="dialog-body">
      <div class="dialog-message">
        <p>Welcome to Hypertube!</p>
        <p style="margin-top: 8px;">Since you logged in with a new account, you need to set a unique username.</p>
        <p style="margin-top: 8px;">Please enter your desired username below:</p>
      </div>

      <div class="input-container">
        <input 
          type="text" 
          class="win-input" 
          [(ngModel)]="username" 
          (keyup.enter)="saveUsername()"
          placeholder="e.g. cyber_surfer99" 
          [disabled]="isLoading"
          autofocus 
        />
      </div>

      <div class="error-box" *ngIf="errorMsg">
        ⚠ {{ errorMsg }}
      </div>
    </div>

    <div class="dialog-footer">
      <button class="win-btn" (click)="saveUsername()" [disabled]="isLoading">
        {{ isLoading ? 'Please wait...' : 'OK' }}
      </button>
    </div>

  </div>
</div>
