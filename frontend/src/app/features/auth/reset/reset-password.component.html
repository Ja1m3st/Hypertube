<div class="auth-container">
  <div class="auth-bg-grid"></div>
  <div class="auth-card">
    <h1 class="auth-title">Set New Password</h1>
    <p class="auth-subtitle">Choose a new password for your account.</p>

    <div *ngIf="successMessage" style="background:#ffffff;border:2px inset #808080;padding:10px;margin:0 16px 15px;color:#008000;font-weight:bold;font-size:11px;">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

    <ng-container *ngIf="!successMessage">
      <div class="field-group">
        <label for="password">New password</label>
        <input id="password" type="password" [(ngModel)]="password"
               placeholder="At least 8 characters"
               (input)="validatePasswords()">
        <span *ngIf="passwordError" class="input-error">{{ passwordError }}</span>
      </div>

      <div class="field-group">
        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword"
               placeholder="Repeat your password"
               (input)="validatePasswords()">
        <span *ngIf="confirmError" class="input-error">{{ confirmError }}</span>
      </div>

      <button class="btn-submit"
              (click)="resetPassword()"
              [disabled]="isLoading || !password || !confirmPassword || !!passwordError || !!confirmError">
        {{ isLoading ? 'Saving...' : 'Save New Password' }}
      </button>
    </ng-container>

    <p class="auth-footer">
      Remembered it? <a routerLink="/login">Go back to Login</a>
    </p>
  </div>
</div>
