<div class="auth-container">
  <div class="auth-bg-grid"></div>
  <div class="auth-card">
    <div class="error-titlebar" style="background: linear-gradient(to right, #000080, #1084d0); color: white; padding: 4px; font-weight: bold; font-size: 12px; margin-bottom: 15px;">
      Password Recovery
    </div>

    <h1 class="auth-title" style="padding-top: 0;">Reset Password</h1>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

    <div *ngIf="successMessage" style="background: #ffffff; border: 2px inset #808080; padding: 10px; margin: 0 16px 15px; color: #008000; font-weight: bold; font-size: 11px;">
      {{ successMessage }}
    </div>

    <div class="field-group" *ngIf="!successMessage">
      <label for="email">Email address</label>
      <input id="email" type="email" [(ngModel)]="email" placeholder="example@gmail.com">
    </div>

    <button class="btn-submit" (click)="sendResetLink()" [disabled]="isLoading || !email || successMessage">
      {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
    </button>

    <p class="auth-footer">
      Remembered it? <a routerLink="/login">Go back to Login</a>
    </p>
  </div>
</div>
