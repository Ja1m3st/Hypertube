<div class="auth-container">
  <div class="auth-card">

    <div class="win98-titlebar">
      <span>Hypertube — Autenticando</span>
      <div class="win98-titlebar-buttons">
        <span class="win98-btn">_</span>
        <span class="win98-btn">□</span>
        <span class="win98-btn">✕</span>
      </div>
    </div>

    <div class="auth-body">
      <div class="auth-inset-box">
        <span class="hourglass-icon">{{ hourglassIcon }}</span>
        <p class="auth-title">Authenticating{{ dots }}</p>
        <p class="auth-subtitle">Please wait while we verify your credentials</p>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"></div>
      </div>
    </div>

    <div class="win98-statusbar">
      <span class="status-cell">Ready</span>
      <span class="status-cell status-active">Connecting to server...</span>
    </div>

  </div>
</div>
